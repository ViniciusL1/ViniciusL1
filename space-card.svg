```svg
<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect
    x="5"
    y="5"
    width="1190"
    height="410"
    rx="18"
    fill="#1a1b27"
    stroke="url(#borderGlow)"
    stroke-width="2"
  />

  <!-- Estrelas -->
  <g fill="#ffffff">

    <circle cx="80" cy="60" r="2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>

    <circle cx="220" cy="110" r="1.5">
      <animate attributeName="opacity" values="1;0.3;1" dur="6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="350" cy="50" r="2">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="600" cy="80" r="2">
      <animate attributeName="opacity" values="1;0.2;1" dur="7s" repeatCount="indefinite"/>
    </circle>

    <circle cx="900" cy="65" r="2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1080" cy="100" r="1.5">
      <animate attributeName="opacity" values="1;0.3;1" dur="5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="150" cy="320" r="2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>

    <circle cx="450" cy="360" r="2">
      <animate attributeName="opacity" values="1;0.2;1" dur="6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="760" cy="330" r="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1030" cy="350" r="2">
      <animate attributeName="opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite"/>
    </circle>

  </g>

  <!-- Nome -->
  <text
    x="600"
    y="110"
    text-anchor="middle"
    fill="#7aa2f7"
    font-size="42"
    font-family="Segoe UI, Arial"
    font-weight="bold"
    filter="url(#glow)">
    VINICIUS LIMA
  </text>

  <text
    x="600"
    y="145"
    text-anchor="middle"
    fill="#c0caf5"
    font-size="20"
    font-family="Segoe UI, Arial">
    FullStack Developer
  </text>

  <!-- Linha -->
  <line
    x1="250"
    y1="175"
    x2="950"
    y2="175"
    stroke="#414868"
    stroke-width="1"
  />

  <!-- Backend -->
  <text x="120" y="230" fill="#7aa2f7" font-size="22" font-weight="bold">
    Backend
  </text>

  <text x="120" y="260" fill="#c0caf5" font-size="18">
    Java • Spring Boot
  </text>

  <!-- Database -->
  <text x="470" y="230" fill="#7aa2f7" font-size="22" font-weight="bold">
    Database
  </text>

  <text x="470" y="260" fill="#c0caf5" font-size="18">
    PostgreSQL • MySQL • SQLite
  </text>

  <!-- Android -->
  <text x="120" y="320" fill="#7aa2f7" font-size="22" font-weight="bold">
    Android
  </text>

  <text x="120" y="350" fill="#c0caf5" font-size="18">
    Kotlin • Jetpack Compose
  </text>

  <!-- Tools -->
  <text x="470" y="320" fill="#7aa2f7" font-size="22" font-weight="bold">
    Tools
  </text>

  <text x="470" y="350" fill="#c0caf5" font-size="18">
    VS Code • Android Studio
  </text>

</svg>
```
